<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💖 Love Page</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffb6c1, #ff69b4);
  font-family: Arial;
}

.container {
  text-align: center;
  color: white;
  position: relative;
  width: 100%;
}

h1 {
  margin-bottom: 30px;
}

.btn {
  padding: 15px 25px;
  border: none;
  border-radius: 25px;
  font-size: 18px;
  cursor: pointer;
  margin: 10px;
}

.yes {
  background: #ff2e63;
  color: white;
}

.no {
  background: white;
  color: #ff2e63;
  position: absolute;
  top: 60%;
  left: 55%;
}

.celebration {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ff2e63;
  color: white;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
}
</style>
</head>

<body>

<div class="container">
  <h1>Will you be my girlfriend? 💖</h1>

  <button class="btn yes" onclick="yesClicked()">Yes</button>
  <button class="btn no" id="noBtn">No</button>
</div>

<div class="celebration" id="celebration">
  ❤️ Yay! I love you ❤️
</div>

<script>
const noBtn = document.getElementById("noBtn");

function moveBtn() {
  const maxX = window.innerWidth - 120;
  const maxY = window.innerHeight - 80;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveBtn);
noBtn.addEventListener("touchstart", moveBtn);

function yesClicked() {
  document.querySelector(".container").style.display = "none";
  document.getElementById("celebration").style.display = "flex";
}
</script>

</body>
</html>
