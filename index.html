<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anish 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;

  background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url("https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=1950&q=80");

  background-size: cover;
  background-position: center;
  font-family: Arial;
}

.container {
  text-align: center;
  color: white;
  width: 100%;
  padding: 20px;
}

h1 {
  margin-bottom: 30px;
  font-size: 22px;
}

.btn {
  padding: 15px 25px;
  border: none;
  border-radius: 25px;
  font-size: 18px;
  cursor: pointer;
  margin: 10px;
  transition: transform 0.2s ease;
}

/* YES BUTTON */
.yes {
  background: #ff2e63;
  color: white;
  position: relative;
  z-index: 2;
}

/* NO BUTTON */
.no {
  background: white;
  color: #ff2e63;
  position: fixed;
  top: 60%;
  left: 55%;
  transform: translate(-50%, -50%);
  transition: left 0.2s ease, top 0.2s ease;
  z-index: 2;
}

/* CELEBRATION */
.celebration {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ff2e63;
  color: white;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  flex-direction: column;
}
</style>
</head>

<body>

<div class="container">
  <h1>Annu, tumne kya soch h fir, mutton khila rahi ho? 💖</h1>

  <button class="btn yes" id="yesBtn">Yes</button>
  <button class="btn no" id="noBtn">No</button>
</div>

<div class="celebration" id="celebration">
  ❤️ tik h, dekhte h ❤️
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

const noTexts = [
  "No 😜",
  "Soch lo 😂",
  "Tum na bol rhi ho 😏",
  "Ek bar fir se soch lo 🏃‍♂️"
];

const yesTexts = [
  "Yes ❤️",
  "Sach m? 🥺",
  "Pakka? 😳",
  "Baad me na nhi bolna fir? 💖",
  "Main jaanta hu 😌",
  "Tumne ha!! kaha 🎉"
];

let yesIndex = 0;

/* NO BUTTON MOVES AWAY */
function moveNo() {
  const padding = 120;

  const x = Math.random() * (window.innerWidth - padding);
  const y = Math.random() * (window.innerHeight - padding);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  noBtn.innerText = noTexts[Math.floor(Math.random() * noTexts.length)];
}

/* YES CLICK SEQUENCE */
function yesStep() {
  if (yesIndex < yesTexts.length) {
    yesBtn.innerText = yesTexts[yesIndex];
    yesBtn.style.transform = `scale(${1 + yesIndex * 0.12})`;
    yesIndex++;
  } else {
    document.querySelector(".container").style.display = "none";
    document.getElementById("celebration").style.display = "flex";
  }
}

/* EVENTS */

// NO button (runs away)
noBtn.addEventListener("mouseenter", moveNo);
noBtn.addEventListener("touchstart", moveNo);
noBtn.addEventListener("click", moveNo);

// YES button (clickable steps)
yesBtn.addEventListener("click", yesStep);
yesBtn.addEventListener("touchstart", yesStep);
</script>

</body>
</html>
